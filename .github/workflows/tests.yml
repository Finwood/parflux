name: tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  statuses: write

jobs:
  unit:
    name: unit (py${{ matrix.python-version }}, ${{ matrix.resolution-strategy }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]
        resolution-strategy: ["lowest-direct", "highest"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group test --resolution ${{ matrix.resolution-strategy }}

      - name: Run tests
        run: uv run pytest

      - name: Upload coverage report
        if: matrix.python-version == '3.14'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error

      - name: Publish HTML coverage to Smokeshow
        if: matrix.python-version == '3.14'
        continue-on-error: true
        run: |
          if [ -n "${SMOKESHOW_AUTH_KEY:-}" ]; then
            uvx smokeshow upload htmlcov
          else
            echo "SMOKESHOW_AUTH_KEY not set; skipping Smokeshow upload."
          fi
        env:
          SMOKESHOW_AUTH_KEY: ${{ secrets.SMOKESHOW_AUTH_KEY }}
          SMOKESHOW_GITHUB_STATUS_DESCRIPTION: Coverage {coverage-percentage}
          SMOKESHOW_GITHUB_COVERAGE_THRESHOLD: 90
          SMOKESHOW_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SMOKESHOW_GITHUB_PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

  smoke:
    name: smoke (wheel install + CLI)
    runs-on: ubuntu-latest
    needs: unit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Build wheel
        run: uv build --wheel

      - name: Install wheel in fresh environment and run CLI smoke test
        run: |
          python -m venv .smoke-venv
          source .smoke-venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/*.whl
          parflux --help

  integration:
    name: integration (live InfluxDB)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      influxdb:
        image: influxdb:2.7
        ports:
          - 8086:8086
        env:
          DOCKER_INFLUXDB_INIT_MODE: setup
          DOCKER_INFLUXDB_INIT_USERNAME: admin
          DOCKER_INFLUXDB_INIT_PASSWORD: parflux_ci_password
          DOCKER_INFLUXDB_INIT_ORG: parflux-ci
          DOCKER_INFLUXDB_INIT_BUCKET: seed
          DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: parflux-ci-token
        options: >-
          --health-cmd "curl -f http://localhost:8086/health"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      INFLUXDB_V2_URL: http://localhost:8086
      INFLUXDB_V2_ORG: parflux-ci
      INFLUXDB_V2_TOKEN: parflux-ci-token
      PARFLUX_RUN_INTEGRATION: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: uv sync --group test

      - name: Run integration tests
        run: uv run pytest -m integration
