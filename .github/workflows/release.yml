name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: publish (PyPI + GitHub release)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Validate tag and project version match
        id: version_check
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != v* ]]; then
            echo "Expected tag starting with 'v' (for example: v0.2.0), got: ${tag}" >&2
            exit 1
          fi
          tag_version="${tag#v}"

          project_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"

          if [[ "${project_version}" != "${tag_version}" ]]; then
            echo "Version mismatch: tag=${tag_version} pyproject=${project_version}" >&2
            exit 1
          fi

          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        # Preferred setup: configure PyPI Trusted Publishing for this repository/workflow.
        # Fallback setup: define repository secret UV_PUBLISH_TOKEN with a PyPI API token.
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.UV_PUBLISH_TOKEN }}
        run: uv publish

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: parflux ${{ steps.version_check.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*
