name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  publish:
    name: publish (PyPI + GitHub release)
    runs-on: ubuntu-latest
    environment:
      name: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true

      - name: Validate tag and project version match
        id: version_check
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          if [[ "${tag}" != v* ]]; then
            echo "Expected tag starting with 'v' (for example: v0.2.0), got: ${tag}" >&2
            exit 1
          fi
          tag_version="${tag#v}"

          project_version="$(python - <<'PY'
          import tomllib
          from pathlib import Path

          data = tomllib.loads(Path("pyproject.toml").read_text(encoding="utf-8"))
          print(data["project"]["version"])
          PY
          )"

          if [[ "${project_version}" != "${tag_version}" ]]; then
            echo "Version mismatch: tag=${tag_version} pyproject=${project_version}" >&2
            exit 1
          fi

          echo "version=${tag_version}" >> "${GITHUB_OUTPUT}"

      - name: Build distributions
        run: uv build

      - name: Publish to PyPI
        # Uses PyPI trusted publishing via OIDC (requires environment + PyPI publisher setup).
        run: uv publish --trusted-publishing always

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: parflux ${{ steps.version_check.outputs.version }}
          generate_release_notes: true
          files: |
            dist/*
